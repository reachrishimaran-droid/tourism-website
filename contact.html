<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background-color: #f5f6fa;
        }

        header {
            background: linear-gradient(45deg, #2c3e50, #3498db);
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #34495e;
            padding: 12px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #f1c40f;
        }

        .hero {
            height: 250px;
            background: url('https://source.unsplash.com/1600x500/?contact,travel') no-repeat center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 30px;
            font-weight: bold;
            text-shadow: 2px 2px 5px black;
        }

        .section {
            padding: 40px;
            text-align: center;
        }

        .contact-box {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .info, .form-box {
            background: white;
            padding: 25px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        .info h3 {
            margin-bottom: 15px;
        }

        input, textarea {
            width: 90%;
            padding: 10px;
            margin: 8px;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #219150;
        }

        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>📞 Contact Us</h1>
    <p>We are here to help you plan your trip</p>
</header>

<nav>
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('destinations') }}">Destinations</a>
    <a href="{{ url_for('cars') }}">Car Travel</a>
    <a href="{{ url_for('contact') }}">Contact</a>
</nav>

<div class="hero">
    Get in Touch With Us ✉️
</div>

<div class="section">
    <h2>Contact Information</h2>

    <div class="contact-box">

        <!-- 📞 Info -->
        <div class="info">
            <h3>📍 Address</h3>
            <p>Chennai, Tamil Nadu</p>

            <h3>📞 Phone</h3>
            <p>+91 8668079969</p>

            <h3>📧 Email</h3>
            <p>reachrishimaran@gmail.com</p>
        </div>

        <!-- 📋 Form -->
        <div class="form-box">
            <h3>Send Message</h3>

            <form method="POST">

                <input type="text" name="name" placeholder="Your Name" required>

                <input type="email" name="email" placeholder="Your Email" required>

                <textarea name="message" placeholder="Your Message" rows="4"></textarea>

                <br>
                <button type="submit">Send Message 📩</button>

            </form>
        </div>

    </div>
</div>

<footer>
    <p>© 2026 Tourism Website | Contact Support 📞</p>
</footer>

</body>
</html>
