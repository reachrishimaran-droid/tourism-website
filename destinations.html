<!DOCTYPE html>
<html lang="en">
<head>
    <title>Destinations</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
            color: white;
        }

        h1 {
            text-align: center;
            margin-top: 20px;
            font-size: 40px;
        }

        nav {
            background: rgba(0,0,0,0.7);
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }

        nav a:hover {
            color: yellow;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 50px;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
            width: 250px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.1);
            background: rgba(0,0,0,0.8);
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .card h2 {
            margin-top: 10px;
        }

        .card p {
            font-size: 14px;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding: 10px;
            background: rgba(0,0,0,0.7);
        }
    </style>
</head>

<body>

<h1>Explore Top Destinations 🌍</h1>

<nav>
<a href="{{ url_for('home') }}">Home</a>
<a href="{{ url_for('destinations') }}">Destinations</a>
<a href="{{ url_for('cars') }}">Car Travel</a>
<a href="{{ url_for('contact') }}">Contact</a>
</nav>

<div class="container">

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Chennai_Marina_beach.jpg">
        <h2>Chennai</h2>
        <p>Experience beaches, culture, and city life.</p>
    </div>

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Ooty_lake.jpg">
        <h2>Ooty</h2>
        <p>Enjoy cool weather and beautiful hills.</p>
    </div>

    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Meenakshi_Amman_Temple.jpg">
        <h2>Madurai</h2>
        <p>Discover temples and rich history.</p>
    </div>

</div>

<footer>
    <p>© 2026 Tourism Website | Explore Tamil Nadu</p>
</footer>

</body>
</html>
